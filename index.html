<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Font awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisyui lady and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google front -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- StyleSheet -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card w-96 bg-base-100 shadow-xl">
      <div class="card-body">
        <div class="flex justify-center mb-2">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h2 class="text-center text-xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-center text-sm text-gray-500 mb-3">
          Sign in to manage your issues
        </p>

        <label class="label">
          <span class="text-gray-950 font-semibold">Username</span>
        </label>

        <input
          type="text"
          placeholder="Enter Username"
          class="input input-bordered w-full"
          id="userName"
        />
        <p class="text-xs text-blue-500">Default: admin</p>

        <label class="label">
          <span class="text-gray-950 font-semibold">Password</span>
        </label>

        <input
          type="password"
          placeholder="Enter Password"
          class="input input-bordered w-full"
          id="password"
        />

        <p class="text-xs text-blue-500">Default: admin123</p>

        <button
          class="btn mt-2 text-white border-none btn-primary" onclick="login()"
        >
          Sign In
        </button>

        <div class="divider">OR</div>

        <div class="bg-base-200 p-2 rounded-lg text-center text-sm space-y-2">
          <p class="mb-4 text-gray-500">Demo Credentials :</p>
          <p>Username: admin</p>
          <p>Password: admin123</p>
        </div>
      </div>
    </div>

    <script src="./scripts/script.js"></script>
  </body>
</html>
