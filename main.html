<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title></title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Font awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisyui lady and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google front -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- StyleSheet -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header class="mx-auto mb-14">
      <div class="navbar bg-base-200 flex justify-between px-12">
        <div class="flex items-center">
          <img
            src="./assets/github-logo.png"
            height="50px"
            width="50px"
            alt=""
          />
          <h2 class="btn btn-ghost text-xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
          <label class="input input-bordered flex items-center gap-2">
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            <input type="text" class="grow" placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>

    <section class="container mx-auto">
      <div class="bg-slate-100 rounded-xl space-x-3 shadow-xl p-4">
        <button id="allTab" class="btn btn-primary" onclick="loadIssues()">
          All
        </button>
        <button id="openTab" class="btn" onclick="showOpen()">Open</button>
        <button id="closedTab" class="btn" onclick="showClosed()">
          Closed
        </button>
      </div>
    </section>

    <section
      class="container mx-auto my-3 bg-slate-100 rounded-xl shadow-xl p-4"
    >
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
          <img src="./assets/Aperture.png" alt="" />
          <div>
            <h2 class="text-xl font-bold"><span id="length">0</span> Issues</h2>
            <p class="text-gray-400">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-3">
          <div class="flex items-center gap-2">
            <img src="./assets/Open-Status.png" alt="" />
            <p>Open</p>
          </div>
          <div class="flex items-center gap-2">
            <img src="./assets/Closed- Status .png" alt="" />
            <p>closed</p>
          </div>
        </div>
      </div>
    </section>

    <section class="container mx-auto">
      <div id="allIssues" class="grid grid-cols-4 gap-8"></div>

      <!-- Open the modal using ID.showModal() method -->
      <dialog id="my_modal" class="modal">
        
      </dialog>
    </section>

    <script src="./scripts/script.js"></script>
  </body>
</html>
